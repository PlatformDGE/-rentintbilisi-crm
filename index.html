<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1d3560" />
  <title>Rent in Tbilisi CRM</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <img src="assets/logo.png" alt="Rent in Tbilisi" onerror="this.style.display='none'">
        <div><b>Rent in Tbilisi</b><span>CRM</span></div>
      </div>
      <button class="primary full" data-action="new-property">+ Новый объект</button>
      <nav id="nav"></nav>
      <div class="note"><b id="sideCount">0</b><span>записей в демо-базе</span></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="round mobile" id="menuBtn">☰</button>
        <div class="heading"><h1 id="pageTitle">Главная</h1><p id="pageSub">Рабочая CRM для команды</p></div>
        <label class="search"><span>⌕</span><input id="search" placeholder="Поиск"></label>
        <button class="round" id="themeBtn">◐</button>
      </header>
      <section class="content" id="content"></section>
    </main>
  </div>

  <div class="overlay" id="overlay"></div>
  <aside class="drawer" id="drawer"></aside>
  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
