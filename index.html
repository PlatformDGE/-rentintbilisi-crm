<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1d3560" />
  <title>Rent in Tbilisi CRM</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <aside class="side" id="side">
    <div class="brand">
      <img src="assets/logo.png" alt="Rent in Tbilisi" onerror="this.remove()">
      <div><b>Rent in Tbilisi</b><span>CRM</span></div>
    </div>
    <button class="new" onclick="openCreate()">＋ Добавить</button>
    <nav id="nav"></nav>
    <div class="side-card"><b id="recordsCount">0</b><span>записей в базе браузера</span></div>
  </aside>

  <main class="app">
    <header class="top">
      <button class="icon mobile" onclick="toggleMenu()">☰</button>
      <div>
        <h1 id="title">Главная</h1>
        <p id="subtitle">Рабочая панель Rent in Tbilisi</p>
      </div>
      <label class="search"><span>⌕</span><input id="search" placeholder="Поиск по CRM"></label>
      <button class="icon" onclick="toggleTheme()">◐</button>
    </header>
    <section id="view" class="view"></section>
  </main>

  <div class="shade" id="shade" onclick="closeDrawer()"></div>
  <aside class="drawer" id="drawer"></aside>
  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
