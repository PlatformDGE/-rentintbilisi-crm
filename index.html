<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1d3560" />
  <title>Rent in Tbilisi CRM</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css?v=4" />
  <link rel="stylesheet" href="dashboard.css?v=4" />
</head>
<body>
  <div class="app-shell">
    <aside class="side" id="side">
      <div class="brand"><img src="logo.png" alt="logo"><div><strong>Rent in Tbilisi</strong><span>Рабочая CRM</span></div></div>
      <button class="big-action" id="newObjectBtn">+ Новый объект</button>
      <nav id="nav"></nav>
      <div class="side-card"><span>Сегодня</span><b id="todayStats">0 задач</b><small>Демо-данные сохраняются в браузере</small></div>
    </aside>

    <main class="main">
      <header class="top">
        <button class="icon-btn mobile" id="menuBtn">☰</button>
        <div class="title">
          <h1 id="title">Главная</h1>
          <p id="subtitle">Рабочая CRM для Rent in Tbilisi</p>
          <span class="mobile-brand">Rent in Tbilisi CRM</span>
        </div>
        <label class="search"><span>⌕</span><input id="search" placeholder="Поиск объектов, клиентов..."></label>
        <button class="icon-btn" id="themeBtn">◐</button>
      </header>
      <section class="content" id="content"></section>
    </main>
  </div>

  <div class="overlay" id="overlay"></div>
  <aside class="drawer" id="drawer"></aside>
  <div class="toast" id="toast"></div>
  <script src="lib-repository.js?v=4"></script>
  <script src="lib-telegram-notifier.js?v=4"></script>
  <script src="app.js?v=4"></script>
  <script src="telegram-top10.js?v=4"></script>
</body>
</html>
