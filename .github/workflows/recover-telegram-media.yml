name: Recover Telegram property media

on:
  push:
    branches:
      - feature/telegram-media-recovery
    paths:
      - .github/workflows/recover-telegram-media.yml
      - requirements.txt
      - scripts/import_telegram_property_registry.py
      - scripts/import_telegram_property_registry_test.py
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: telegram-media-recovery-preview
  cancel-in-progress: false

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Validate Telegram secrets
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        run: |
          test -n "$TELEGRAM_API_ID"
          test -n "$TELEGRAM_API_HASH"
          test -n "$TELEGRAM_SESSION"
      - name: Recover and validate Telegram media
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          TELEGRAM_REGISTRY_MESSAGE_LIMIT: "200"
        run: python scripts/import_telegram_property_registry.py
      - name: Commit preview media artifacts
        run: |
          if test -z "$(git status --porcelain -- telegram-property-registry.json public/telegram-media)"; then
            echo "Telegram media has not changed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add telegram-property-registry.json public/telegram-media
          git commit -m "Recover Telegram property media"
          git push
