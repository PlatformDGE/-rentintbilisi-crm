name: Update Telegram Top 10

on:
  schedule:
    - cron: "12 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Parse Telegram channel
        run: python scripts/parse_telegram_top10.py
      - name: Commit updated data
        run: |
          if git diff --quiet -- telegram-top10.json; then
            echo "Telegram data has not changed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add telegram-top10.json
          git commit -m "Update Telegram top 10"
          git push
