name: Update Telegram Top 10

on:
  schedule:
    - cron: "0 6-18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-telegram-repost-ranking
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate Telegram secrets
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        run: |
          test -n "$TELEGRAM_API_ID" || { echo "Missing TELEGRAM_API_ID"; exit 1; }
          test -n "$TELEGRAM_API_HASH" || { echo "Missing TELEGRAM_API_HASH"; exit 1; }
          test -n "$TELEGRAM_SESSION" || { echo "Missing TELEGRAM_SESSION"; exit 1; }
      - name: Update daily repost ranking
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        run: python scripts/update_telegram_top10.py
      - name: Commit updated data
        run: |
          if git diff --quiet -- telegram-top10.json telegram-reposts-state.json telegram-images; then
            echo "Telegram repost ranking has not changed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add telegram-top10.json telegram-reposts-state.json telegram-images
          git commit -m "Update daily Telegram repost ranking"
          git push
