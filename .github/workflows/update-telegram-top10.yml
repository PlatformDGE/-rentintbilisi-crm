name: Update Telegram Top 10

on:
  push:
    branches:
      - feature/telegram-property-registry
  schedule:
    - cron: "0 6-18 * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Запустить временный тестовый режим и сразу показать текущие репосты"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-telegram-repost-ranking
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate Telegram secrets
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        run: |
          missing=()
          test -n "$TELEGRAM_API_ID" || missing+=(TELEGRAM_API_ID)
          test -n "$TELEGRAM_API_HASH" || missing+=(TELEGRAM_API_HASH)
          test -n "$TELEGRAM_SESSION" || missing+=(TELEGRAM_SESSION)
          if (( ${#missing[@]} )); then
            echo "Missing required Telegram secrets:"
            printf '%s\n' "${missing[@]}"
            exit 1
          fi
      - name: Update daily repost ranking
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          TELEGRAM_TEST_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.test_mode || 'false' }}
        run: python scripts/update_telegram_top10.py
      - name: Import independent property registry
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          TELEGRAM_REGISTRY_MESSAGE_LIMIT: "100"
        run: python scripts/import_telegram_property_registry.py
      - name: Commit updated data
        run: |
          if git diff --quiet -- telegram-top10.json telegram-reposts-state.json telegram-property-lifecycle.json telegram-property-registry.json telegram-images telegram-media; then
            echo "Telegram repost ranking has not changed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add telegram-top10.json telegram-reposts-state.json telegram-property-lifecycle.json telegram-property-registry.json telegram-images telegram-media
          git commit -m "Update daily Telegram repost ranking"
          git push
